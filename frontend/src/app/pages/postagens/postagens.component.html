<mat-card class="post-card">
  <mat-card-header>
    <mat-chip-option class="chip-option">Recentes</mat-chip-option>
    <mat-chip-option class="chip-option">Trending</mat-chip-option>
    <mat-chip-option class="chip-option">Minhas Postagens</mat-chip-option>
  </mat-card-header>
 
 
  <mat-card-content class="post-content" *ngFor="let post of posts">
    <div class="post-item">
      <mat-card-title>Nome do autor</mat-card-title>
      <div mat-card-avatar class="post-avatar"></div>
      <mat-card-content>
        <p>
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do
          eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button>Curtir</button>
        <button mat-button>Comentar</button>
        <button mat-button>Compartilhar</button>
      </mat-card-actions>
    </div>
  </mat-card-content>

  <mat-paginator
    [length]=""
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 25, 100]"
  ></mat-paginator>
</mat-card>
