<div class="chat-wrapper">
  <div class="chat-header">
    <div class="header-info">
      <mat-icon class="ai-icon">smart_toy</mat-icon>
      <div>
        <h2>TeachHub IA</h2>
        <p>Seu tutor educacional inteligente</p>
      </div>
    </div>
    <button mat-icon-button (click)="voltar()" title="Voltar">
      <mat-icon>arrow_back</mat-icon>
    </button>
  </div>

  <div class="messages-container">
    <div *ngFor="let msg of message" [ngClass]="['message-wrapper', msg.type]">
      
      <div class="avatar" *ngIf="msg.type === 'ia'">
        <mat-icon>smart_toy</mat-icon>
      </div>

      <div class="message-bubble">
        <span class="text">{{msg.text}}</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <mat-form-field appearance="outline" class="chat-input-field">
      <input
        matInput
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        placeholder="Faça uma pergunta ao TeachHub IA..."
        autocomplete="off"
      />
      <button mat-icon-button matSuffix (click)="sendMessage()" [disabled]="!userInput.trim()">
        <mat-icon color="primary">send</mat-icon>
      </button>
    </mat-form-field>
  </div>
</div>
