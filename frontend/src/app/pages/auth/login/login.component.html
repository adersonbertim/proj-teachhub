<mat-card class="login-container">
  <mat-card-header>
    <mat-card-title>Login TeachHub</mat-card-title>
    <mat-card-subtitle>Bem vindo a melhor plataforma de conectividade entre professor do Planeta!</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="login-card">
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>E-mail</mat-label>
          <input 
            matInput 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="loginData.email" 
            required 
            placeholder="exemplo@email.com">
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Senha</mat-label>
          <input 
            matInput 
            type="password" 
            id="senha" 
            name="senha" 
            [(ngModel)]="loginData.senha" 
            required 
            placeholder="Sua senha">
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">Entrar</button>
      </form>
